name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.1'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirement.txt

    - name: Test with pytest
      run: |
        python -m pytest tests/
        
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.image.outputs.tag }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=sha,prefix=
          type=ref,event=branch

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Save image tag
      id: image
      run: echo "tag=$(echo '${{ steps.meta.outputs.tags }}' | head -1)" >> $GITHUB_OUTPUT

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull image
      run: docker pull ${{ needs.build.outputs.image }}

    - name: Start container
      run: docker run -d -p 5000:5000 --name app ${{ needs.build.outputs.image }}

    - name: Wait for app to be ready
      run: |
        for i in $(seq 1 10); do
          curl -sf http://localhost:5000/health && break
          echo "Attempt $i failed, retrying..."
          sleep 2
        done

    - name: Validate /ping endpoint
      run: |
        response=$(curl -sf http://localhost:5000/health)
        echo "Response: $response"
        echo "$response" | grep '"status":"OK"'

    - name: Validate / endpoint
      run: |
        response=$(curl -sf http://localhost:5000/)
        echo "Response: $response"
        echo "$response" | grep '"message"'

    - name: Show container logs on failure
      if: failure()
      run: docker logs app
